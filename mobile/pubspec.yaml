name: game_event
description: GAME EVENT - تطبيق إدارة الاشتراكات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Supabase
  supabase_flutter: ^2.5.3

  # HTTP
  http: ^1.2.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

  # Routing
  go_router: ^13.0.0

  # Misc
  intl: ^0.19.0
  url_launcher: ^6.2.2

dependency_overrides:
  package_info_plus: 8.0.2
  # passkeys_doctor 1.4.1 breaks build (flutter.compileSdkVersion not available
  # in library context). 2.0.0+ uses compileSdkVersion 34 directly.
  passkeys_doctor: 2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
