name: Build GAME EVENT APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             mobile/build/app/outputs/flutter-apk/GAME_EVENT_v1.0.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAME_EVENT_APK
          path: mobile/build/app/outputs/flutter-apk/GAME_EVENT_v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "GAME EVENT v1.0.0"
          body: |
            ## GAME EVENT v1.0.0

            ### تحميل التطبيق
            حمّل ملف `GAME_EVENT_v1.0.0.apk` من قسم Assets أدناه

            ### المميزات
            - نظام اشتراكات (يومي $5 / أسبوعي $10 / شهري $20)
            - دفع عبر Sham Cash / Syriatel Cash / USDT BEP20
            - تحقق تلقائي من TXID على البلوكشين
            - لوحة تحكم للأدمن الكاملة
            - حماية صفحة Engine بصلاحيات Root
            - واجهة عربية RTL احترافية

            ### متطلبات التشغيل
            - Android 5.0 (API 21) أو أعلى
            - السماح بتثبيت تطبيقات من مصادر غير معروفة

            ### بيانات الأدمن الافتراضية
            - Email: charlegilmore75@gmail.com
            - Password: Admin@123456
          files: mobile/build/app/outputs/flutter-apk/GAME_EVENT_v1.0.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
